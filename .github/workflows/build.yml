name: Build

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  EXPO_NO_TELEMETRY: '1'

jobs:
  quality:
    name: Lint, typecheck & test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Prettier
        run: npm run format:check
      - name: ESLint
        run: npm run lint
      - name: TypeScript
        run: npm run typecheck
      - name: Unit tests
        run: npm run test:ci
      - name: Validate Expo config
        run: npx expo config --type public > /dev/null

  android:
    name: Build Android (APK)
    runs-on: ubuntu-latest
    needs: quality
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - uses: android-actions/setup-android@v3
      - name: Install dependencies
        run: npm ci
      - name: Prebuild (generate android project)
        run: npx expo prebuild --platform android --no-install
      - name: Gradle assembleDebug
        working-directory: android
        run: ./gradlew assembleDebug --no-daemon --stacktrace
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: bedtime-android-debug
          path: android/app/build/outputs/apk/debug/*.apk
          if-no-files-found: error

  ios:
    name: Build iOS (Simulator)
    # macos-15 ships Xcode 16.x; React Native 0.86 requires Xcode >= 16.1.
    runs-on: macos-15
    needs: quality
    steps:
      - uses: actions/checkout@v4
      - name: Select Xcode >= 16.1
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Prebuild (generate ios project)
        run: npx expo prebuild --platform ios --no-install
      - name: CocoaPods install
        working-directory: ios
        run: pod install
      - name: Resolve workspace & scheme
        id: xc
        run: |
          WORKSPACE=$(ls -d ios/*.xcworkspace | head -1)
          SCHEME=$(basename "$WORKSPACE" .xcworkspace)
          echo "workspace=$WORKSPACE" >> "$GITHUB_OUTPUT"
          echo "scheme=$SCHEME" >> "$GITHUB_OUTPUT"
      - name: Build (iphonesimulator, no code signing)
        run: |
          xcodebuild \
            -workspace "${{ steps.xc.outputs.workspace }}" \
            -scheme "${{ steps.xc.outputs.scheme }}" \
            -configuration Debug \
            -sdk iphonesimulator \
            -destination 'generic/platform=iOS Simulator' \
            -derivedDataPath ios/build \
            CODE_SIGNING_ALLOWED=NO \
            build
      - name: Upload .app
        uses: actions/upload-artifact@v4
        with:
          name: bedtime-ios-simulator
          path: ios/build/Build/Products/Debug-iphonesimulator/*.app
          if-no-files-found: warn
